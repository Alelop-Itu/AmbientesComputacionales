<p>lista-usuarios works!</p>
<h2>Lista de Usuarios</h2>
<button (click)="abrirNuevo()">Agregar Usuario</button>

<app-form-usuario
    *ngIf="mostrarFormulario"
    [usuario] = "usuarioSeleccionado"
    (guardar)="guardarUsuario($event)"
    (cancelar)="cancelarEdicion()"
    
></app-form-usuario>
<table border="1">
    <thead>
        <tr>
            <th>Nombre</th>
        <th>Email</th>
            <th>Rol</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let usuario of usuarios">
            <td>{{usuario.nombre}}</td>
            <td>{{usuario.email}}</td>
            <td>{{usuario.rol}}</td>
            <td>
                <button (click)="editarUsuario(usuario)">Editar</button>
                <button (click)="eliminarUsuario(usuario.id)">Eliminar</button>
           
        </td>
    </tr>
</table>
